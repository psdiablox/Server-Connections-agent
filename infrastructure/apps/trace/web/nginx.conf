server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed asset bundles — Vite content-hashes filenames, safe to cache long.
    location ~* \.(?:js|mjs|css|woff2?|svg|ico|png|jpg|jpeg|webp)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Everything else (HTML + SPA fallback) — never cache, so deploys propagate
    # immediately and old index.html doesn't pin clients to old bundle hashes.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
