<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Trading Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#0f172a',
            card:    '#1e293b',
            border:  '#334155',
            up:      '#10b981',
            down:    '#ef4444',
            accent:  '#3b82f6',
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .badge-up   { background: #064e3b; color: #10b981; border: 1px solid #10b981; }
    .badge-down { background: #450a0a; color: #ef4444; border: 1px solid #ef4444; }
    .badge-live { background: #1e3a5f; color: #3b82f6; border: 1px solid #3b82f6; }
    .stat-label { color: #64748b; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .stat-value { font-size: 1.4rem; font-weight: 700; }
  </style>
</head>
<body class="min-h-screen">

  {% block nav %}
  <nav class="border-b border-border px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <span class="text-accent font-bold text-lg tracking-widest">⬡ POLYMARKET</span>
      <a href="/markets" class="text-slate-400 hover:text-white text-sm transition">Markets</a>
    </div>
    <a href="/logout" class="text-slate-500 hover:text-white text-xs transition">logout</a>
  </nav>
  {% endblock %}

  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
