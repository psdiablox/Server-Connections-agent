<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, monospace; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-blue-400 text-3xl font-bold tracking-widest mb-1">⬡ POLYMARKET</div>
      <div class="text-slate-500 text-xs tracking-widest">TRADING DASHBOARD</div>
    </div>

    <form method="post" action="/login"
          class="bg-slate-800 border border-slate-700 rounded-xl p-8 space-y-5">

      {% if error %}
      <div class="bg-red-900/40 border border-red-700 text-red-400 text-sm rounded-lg px-4 py-3">
        Invalid credentials. Try again.
      </div>
      {% endif %}

      <div class="space-y-1">
        <label class="text-slate-400 text-xs tracking-widest uppercase">Username</label>
        <input name="username" type="text" autocomplete="username"
               class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5
                      text-white focus:outline-none focus:border-blue-500 transition"/>
      </div>

      <div class="space-y-1">
        <label class="text-slate-400 text-xs tracking-widest uppercase">Password</label>
        <input name="password" type="password" autocomplete="current-password"
               class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5
                      text-white focus:outline-none focus:border-blue-500 transition"/>
      </div>

      <button type="submit"
              class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold
                     py-2.5 rounded-lg transition tracking-wide">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
