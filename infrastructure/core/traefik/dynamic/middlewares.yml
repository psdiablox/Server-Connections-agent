# Traefik Dynamic Configuration — Reusable Middlewares
# This file is hot-reloaded by Traefik — no restart needed after changes.
#
# ADMIN IP and AUTH are defined in admin-access.yml (gitignored).
# See admin-access.yml.example to set yours up.

http:
  middlewares:
    # Security headers — applied to every public HTTPS route
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        # CSP intentionally omitted — each app sets its own

    # Rate limiting — prevents abuse on public routes
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # Strict rate limiting for auth endpoints
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 5
        period: 1m

    # CORS — uncomment and set your frontend domain when needed
    # cors-api:
    #   headers:
    #     accessControlAllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
    #     accessControlAllowHeaders: ["Authorization", "Content-Type"]
    #     accessControlAllowOriginList: ["https://YOUR_DOMAIN"]
    #     accessControlMaxAge: 100
    #     addVaryHeader: true

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - text/event-stream
