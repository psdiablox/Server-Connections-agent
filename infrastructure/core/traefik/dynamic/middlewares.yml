# Traefik Dynamic Configuration — Reusable Middlewares
# This file is hot-reloaded by Traefik — no restart needed after changes.

http:
  middlewares:
    # Security headers — applied to every public HTTPS route
    secure-headers:
      headers:
        sslRedirect: true
        forceSTSHeader: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"
        customFrameOptionsValue: "SAMEORIGIN"
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"

    # Rate limiting — prevents abuse on public routes
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1m

    # Strict rate limiting for auth endpoints
    rate-limit-auth:
      rateLimit:
        average: 10
        burst: 5
        period: 1m

    # ── ADMIN IP ALLOWLIST ──────────────────────────────────────────────────
    # To update your IP: edit this file and save — Traefik reloads instantly.
    # Use /128 for a single IPv6, /32 for a single IPv4.
    admin-ip:
      ipAllowList:
        sourceRange:
          - "127.0.0.1/32"
          - "10.0.0.0/8"
          - "192.168.0.0/16"
          - "YOUR_ADMIN_IP/128"

    # ── ADMIN BASIC AUTH ────────────────────────────────────────────────────
    # Password stored as bcrypt hash in .htpasswd (gitignored).
    # To change password: htpasswd -nB admin > dynamic/.htpasswd
    admin-auth:
      basicAuth:
        usersFile: /etc/traefik/dynamic/.htpasswd
        realm: "pserenlo.com — Admin"

    # CORS — adjust for your frontend domains
    cors-api:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "Authorization"
          - "Content-Type"
        accessControlAllowOriginList:
          - "https://pserenlo.com"
        accessControlMaxAge: 100
        addVaryHeader: true

    # Compress responses
    compress:
      compress:
        excludedContentTypes:
          - text/event-stream
