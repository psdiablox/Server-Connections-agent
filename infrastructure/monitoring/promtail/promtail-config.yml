server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets: ["localhost"]
        labels:
          job: varlogs
          __path__: /var/log/*.log

  - job_name: deploys
    static_configs:
      - targets: ["localhost"]
        labels:
          job: deploys
          __path__: /var/log/deploys.log
    pipeline_stages:
      - json:
          expressions:
            event: event
            service: service
            commit: commit
            commit_msg: commit_msg
            deployer: deployer
      - labels:
          event:
          service:

  - job_name: docker
    static_configs:
      - targets: ["localhost"]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      - labels:
          stream:
      - timestamp:
          source: time
          format: RFC3339Nano
      - output:
          source: log
